name: CI — Post-Discharge Patient Care Agent

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:

  # ── Backend Tests ────────────────────────────────────────────────────────
  backend-test:
    name: Backend Tests (Python)
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_DB:       postdischarge_test
          POSTGRES_USER:     postgres
          POSTGRES_PASSWORD: postgres
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pytest pytest-cov

      - name: Run unit tests
        env:
          DATABASE_URL:   postgresql://postgres:postgres@localhost:5432/postdischarge_test
          FLASK_ENV:      testing
          WATSONX_API_KEY: ""   # Mock — no real API calls in unit tests
        run: |
          cd src/backend
          pytest tests/unit -v --cov=. --cov-report=xml --cov-report=term

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          file: src/backend/coverage.xml

  # ── Frontend Tests ───────────────────────────────────────────────────────
  frontend-test:
    name: Frontend Tests (React)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js 18
        uses: actions/setup-node@v4
        with:
          node-version: "18"

      - name: Install dependencies
        run: npm ci
        working-directory: frontend

      - name: Run tests
        run: npm test -- --watchAll=false --coverage
        working-directory: frontend

  # ── Security Scan ────────────────────────────────────────────────────────
  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install bandit
        run: pip install bandit

      - name: Run security scan
        run: |
          bandit -r src/backend -ll -x tests/
        continue-on-error: true

  # ── Docker Build ─────────────────────────────────────────────────────────
  docker-build:
    name: Docker Build Verification
    runs-on: ubuntu-latest
    needs: [backend-test, frontend-test]

    steps:
      - uses: actions/checkout@v4

      - name: Build backend image
        run: docker build -t postdischarge-backend:test .

      - name: Verify image runs
        run: |
          docker run --rm \
            -e DATABASE_URL="postgresql://postgres:postgres@localhost/test" \
            -e WATSONX_API_KEY="test" \
            postdischarge-backend:test \
            python -c "from app import create_app; app = create_app(); print('OK')"
